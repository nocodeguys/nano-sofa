name: Build and push Docker image

on:
  push:
    branches:
      - app-v2-design
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nocodeguys/nano-sofa

jobs:
  build-and-push:
    name: Build multi-arch image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :latest on every push to app-v2-design
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/app-v2-design' }}
            # :sha-<short> on every push
            type=sha,prefix=sha-,format=short
            # :<semver-tag> when a v*.*.* tag is pushed
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inline cache so subsequent builds reuse the layer cache stored
          # alongside the image in GHCR — no extra registry needed.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── Make image public note ──────────────────────────────────────────────────
  # After the first push, the package is private by default in GHCR.
  # To make it public:
  #   1. Go to https://github.com/orgs/nocodeguys/packages/container/nano-sofa/settings
  #   2. Scroll to "Danger Zone" → "Change visibility" → Public.
  # The docker run / compose commands in INSTALL.md work without authentication
  # only after this step.
