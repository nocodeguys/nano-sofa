name: Build, push, and release

on:
  push:
    branches:
      - main
      - app-v2-design
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nocodeguys/nano-sofa

jobs:
  build-and-push:
    name: Build multi-arch image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :latest on every push to the default branch (main)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # :edge on every push to the active dev branch
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/app-v2-design' }}
            # :sha-<short> on every push (for pinning to an exact commit)
            type=sha,prefix=sha-,format=short
            # :<semver-tag> when a v*.*.* tag is pushed
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inline cache so subsequent builds reuse the layer cache stored
          # alongside the image in GHCR — no extra registry needed.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Release bundle — runs only on tag pushes, after the image is built + pushed.
  # Produces nano-sofa-vX.Y.Z.zip containing the docker-compose.yml (pinned to
  # the released tag, build: block stripped), the double-click installers, and
  # INSTALL.md. Uploads it as a GitHub Release.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release with install bundle
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble release bundle
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export VERSION="${TAG#v}"
          export BUNDLE_NAME="nano-sofa-${TAG}"
          export DEST="/tmp/${BUNDLE_NAME}"
          mkdir -p "${DEST}/install" "${DEST}/outputs"

          # Produce an end-user docker-compose.yml:
          #   1. Pin the image to the released semver tag (not :latest), so an
          #      older bundle never accidentally pulls a newer image with
          #      breaking changes.
          #   2. Strip the build: ... block — end-users pull, never build.
          python3 - <<PY
          import re, os, pathlib
          version = os.environ["VERSION"]
          dest = os.environ["DEST"]
          src = pathlib.Path("docker-compose.yml").read_text()
          src = src.replace(
              "ghcr.io/nocodeguys/nano-sofa:latest",
              f"ghcr.io/nocodeguys/nano-sofa:{version}",
          )
          # Match the build: key plus its indented children (and the trailing blank line)
          src = re.sub(r"\n    build:\n(?:      .*\n)+", "\n", src)
          pathlib.Path(f"{dest}/docker-compose.yml").write_text(src)
          PY

          cp install/start-mac.command "${DEST}/install/"
          chmod +x "${DEST}/install/start-mac.command"
          cp install/start-windows.bat "${DEST}/install/"
          cp INSTALL.md "${DEST}/"
          touch "${DEST}/outputs/.gitkeep"

          (cd /tmp && zip -r "${BUNDLE_NAME}.zip" "${BUNDLE_NAME}")
          ls -la "/tmp/${BUNDLE_NAME}.zip"
          echo "BUNDLE_PATH=/tmp/${BUNDLE_NAME}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUNDLE_PATH }}
          generate_release_notes: true
          body: |
            ## Quick start

            **One-click (Mac / Windows):**
            1. Download `nano-sofa-${{ github.ref_name }}.zip` below
            2. Unzip
            3. Double-click `install/start-mac.command` (Mac) or `install/start-windows.bat` (Windows)
            4. Browser opens at http://localhost:7861 — paste your Gemini API key and click **Generuj wariant**

            **CLI:**
            ```bash
            docker run --rm -p 7861:7861 -v "$PWD/outputs:/app/outputs" \
              ghcr.io/nocodeguys/nano-sofa:${{ github.ref_name }}
            ```

            Get a Gemini API key at <https://aistudio.google.com/app/apikey>. The key stays in your browser (`localStorage`) — never sent anywhere except Google.

            See `INSTALL.md` in the zip for troubleshooting (Docker not installed, port 7861 occupied, etc.).

            ---
